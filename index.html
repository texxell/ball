<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>BallRanger.io - Core Systems Client</title>
    <style>
        /* ============================================================================
         * 全域基礎樣式與霓虹科技感重設
         * ============================================================================ */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050b14;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 3D Three.js 渲染舞台 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 全域網頁背景微光粒子感 */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="grid-overlay"></div>

    <div id="ballranger-main-ui-layer" class="ballranger-ui-container">
        </div>

    <script src="GameMath.js"></script>
    
    <script src="MainScene.js"></script>
    
    <script src="GameCore.js"></script>
    
    <script src="GameUI.js"></script>

</body>
</html>
