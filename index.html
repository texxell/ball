<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BallRanger.io - High-Tech 3D Arena</title>
    <style>
        /* ==========================================================================
           全域與基礎設定 (Global & Base Reset)
           ========================================================================== */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            color: #ffffff;
        }

        /* WebGL 渲染畫布容器 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 遊戲主要 UI 圖層 (採用 Flexbox 與 Grid 實現跨平台自適應) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* 允許點擊穿透至下層的 3D 畫布 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 啟用互動元素的通用類別 */
        .interactive {
            pointer-events: auto;
        }

        /* ==========================================================================
           科幻磨砂玻璃與霓虹特效 (Sci-Fi Glassmorphism & Neon Styles)
           ========================================================================== */
        .glass-panel {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.25);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1), inset 0 0 10px rgba(0, 242, 254, 0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .neon-text-cyan {
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }

        .neon-text-magenta {
            color: #ff007f;
            text-shadow: 0 0 8px rgba(ff, 0, 127, 0.6);
        }

        /* ==========================================================================
           頂部狀態欄 (Top Status Bar)
           ========================================================================== */
        .top-hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 4vw;
        }

        .player-stats {
            display: flex;
            flex-direction: column;
            gap: 0.5vh;
            min-width: 25%;
        }

        .stat-bar-container {
            width: 100%;
            height: 1.5vh;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-bar-fill {
            height: 100%;
            width: 100%;
            transform-origin: left;
            transition: transform 0.2s ease;
        }

        #hp-bar { background: linear-gradient(90deg, #ff0055, #ff007f); }
        #energy-bar { background: linear-gradient(90deg, #0072ff, #00f2fe); }

        .match-info {
            text-align: center;
            font-weight: bold;
            font-size: calc(1.2rem + 0.5vh);
            letter-spacing: 2px;
            padding: 1vh 3vw;
        }

        .leaderboard {
            padding: 1.5vh 2vw;
            font-size: calc(0.75rem + 0.3vh);
            min-width: 20%;
        }
        
        .leaderboard h3 {
            margin-bottom: 0.5vh;
            font-size: calc(0.85rem + 0.3vh);
            border-bottom: 1px solid rgba(0, 242, 254, 0.3);
            padding-bottom: 0.3vh;
        }

        .leaderboard ol {
            list-style-position: inside;
        }

        /* ==========================================================================
           操作控制層 (Input Controls Layout - Split Screen)
           ========================================================================== */
        .controls-layer {
            width: 100%;
            height: 45vh;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 4vw 4vh 4vw;
        }

        /* 左半部：動態觸控搖桿區域 */
        .left-input-zone {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
        }

        /* 虛擬搖桿本體 (預設隱藏，由 JS 動態於觸控點生成或固定顯示) */
        #virtual-joystick {
            width: 25vw;
            height: 25vw;
            max-width: 140px;
            max-height: 140px;
            border-radius: 50%;
            background: rgba(0, 242, 254, 0.05);
            border: 2px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #joystick-knob {
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
            position: absolute;
            transition: transform 0.05s linear;
        }

        /* 右半部：技能與衝刺按鈕區域 */
        .right-input-zone {
            flex: 1;
            height: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            gap: 3vw;
        }

        .action-btn {
            width: 16vw;
            height: 16vw;
            max-width: 85px;
            max-height: 85px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: calc(0.75rem + 0.3vh);
            cursor: pointer;
            border: 1px solid rgba(255, 0, 127, 0.4);
            box-shadow: 0 0 10px rgba(ff, 0, 127, 0.2);
            background: rgba(20, 10, 25, 0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .action-btn:active {
            transform: scale(0.92);
            background: rgba(ff, 0, 127, 0.2);
            border-color: #ff007f;
            box-shadow: 0 0 20px rgba(ff, 0, 127, 0.6);
        }

        #btn-dash {
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
        #btn-dash:active {
            background: rgba(0, 242, 254, 0.2);
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }

        /* ==========================================================================
           滿版彈出視窗與大廳選單 (Full-screen Overlay/Menus)
           ========================================================================== */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5vw;
        }

        .menu-card {
            width: 90%;
            max-width: 500px;
            padding: 4vh 6vw;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 3vh;
        }

        .menu-card h1 {
            font-size: calc(1.8rem + 1vh);
            letter-spacing: 4px;
        }

        .menu-input {
            width: 100%;
            padding: 1.5vh 2vw;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .menu-input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        .primary-btn {
            width: 100%;
            padding: 1.8vh 0;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 6px;
            color: #05050a;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .primary-btn:hover, .primary-btn:active {
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.8);
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        
        <div class="top-hud">
            <div class="player-stats glass-panel" style="padding: 1vh 2vw;">
                <div class="stat-bar-container">
                    <div id="hp-bar" class="stat-bar-fill"></div>
                </div>
                <div class="stat-bar-container">
                    <div id="energy-bar" class="stat-bar-fill"></div>
                </div>
            </div>

            <div id="match-timer" class="match-info glass-panel neon-text-cyan">
                05:00
            </div>

            <div class="leaderboard glass-panel">
                <h3 class="neon-text-cyan">LEADERBOARD</h3>
                <ol id="leaderboard-list">
                    <li><span class="neon-text-magenta">Player 1</span> - 2500</li>
                    <li>Player 2 - 1800</li>
                    <li>Player 3 - 1200</li>
                </ol>
            </div>
        </div>

        <div class="controls-layer">
            <div class="left-input-zone interactive" id="joystick-zone">
                <div id="virtual-joystick">
                    <div id="joystick-knob"></div>
                </div>
            </div>

            <div class="right-input-zone">
                <div id="btn-dash" class="action-btn interactive neon-text-cyan">
                    <span>DASH</span>
                </div>
                <div id="btn-skill" class="action-btn interactive neon-text-magenta">
                    <span>SKILL</span>
                </div>
            </div>
        </div>
    </div>

    <div id="main-menu" class="screen-overlay interactive">
        <div class="menu-card glass-panel">
            <h1 class="neon-text-cyan">BALLRANGER.IO</h1>
            <input type="text" id="player-name" class="menu-input" placeholder="ENTER PILOT NAME" maxlength="15" value="Ranger_01">
            <button id="btn-start" class="primary-btn">ENTER ARENA</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen-overlay hidden">
        <div class="menu-card glass-panel">
            <h1 class="neon-text-magenta">DEFEATED</h1>
            <p>You have been vaporized in the arena.</p>
            <button id="btn-respawn" class="primary-btn interactive">RESPAWN</button>
        </div>
    </div>

    <script type="module">
        // 導入模組化系統，為後續開發的文件進行基底宣告與初始化串接
        import * as THREE from 'three';
        import { PhysicsEngine } from './PhysicsEngine.js';
        import { WeaponSystem } from './WeaponSystem.js';
        import { GameUI } from './GameUI.js';
        import { MainScene } from './MainScene.js';

        document.addEventListener('DOMContentLoaded', () => {
            // 初始化全域遊戲管理器狀態，供各模組進行交互存取
            window.GameManager = {
                physics: null,
                weapons: null,
                ui: null,
                scene: null,
                
                init() {
                    // 核心初始化鏈結，於後續文件實作後依序解鎖
                    console.log("BallRanger.io: Architecture framework initialized.");
                }
            };

            // 執行初始化
            window.GameManager.init();
        });
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="MainScene.js"></script>
    <script src="PhysicsEngine.js"></script>
    <script src="WeaponSystem.js"></script>
    
    <script src="GameUI.js"></script>
    </script>
</body>
</html>
