<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BallRanger.io</title>
    <style>
        /* --- 全局赛博高科技 UI 样式重置 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- 3D 渲染底层画布 --- */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- 苹果风顶级磨砂玻璃效果 --- */
        .glass-panel {
            background: rgba(10, 10, 18, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 200, 0.25);
            border-radius: 16px;
            color: #ffffff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* --- 主菜单大厅界面 --- */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4vh 4vw;
            transition: opacity 0.5s ease;
        }

        .game-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 12px rgba(0, 255, 200, 0.6), 0 0 24px rgba(0, 255, 200, 0.3);
            margin-top: 5vh;
        }

        .lobby-center {
            width: min(90vw, 800px);
            height: 45vh;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .armory-card {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 极光流水霓虹动作按钮 */
        .btn-action {
            background: linear-gradient(135deg, #00ffc8 0%, #0088ff 100%);
            border: none;
            border-radius: 12px;
            color: #050508;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.4);
        }
        .btn-action:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(0, 255, 200, 0.2);
        }

        /* --- 局内战术操作 HUD 界面 --- */
        #game-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: none; /* 默认隐藏，启动后强行开启 */
            pointer-events: none; /* 穿透触摸，交给左屏虚拟摇杆 */
        }
        .interactive {
            pointer-events: auto; /* 按钮恢复点击 */
        }

        .leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 220px;
            padding: 15px;
            font-family: monospace;
        }

        .action-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
        }
        .hud-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            position: relative;
        }
        .hud-btn.locked::after {
            content: '🔒';
            position: absolute;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.6);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 警告消息弹窗 */
        #global-message {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            display: none;
            z-index: 100;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="global-message" class="glass-panel"></div>

    <div id="main-menu">
        <h1 class="game-title">BALLRANGER.IO</h1>
        
        <div class="lobby-center">
            <div class="armory-card glass-panel">
                <h3 style="color:#00ffc8;">ARMORY STOCK</h3>
                <div id="shop-items" style="margin: 10px 0; font-size: 0.9rem;">
                    <div>⚡ Lightning Ammo: <span id="ui-lightning-count">0</span></div>
                    <div>🧲 Vacuum Ammo: <span id="ui-vacuum-count">0</span></div>
                </div>
                <button class="btn-action" style="font-size: 0.9rem; padding: 10px;" id="ad-ammo-btn">WATCH AD FOR AMMO</button>
            </div>
            
            <div class="armory-card glass-panel">
                <h3 style="color:#0088ff;">SELECT ORB</h3>
                <div style="flex:1; display:flex; justify-content:center; align-items:center;">
                    <span style="color:rgba(255,255,255,0.3)">[ 3D Arena Preview ]</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-action" style="flex:1; font-size:0.8rem; padding:8px;">PREV</button>
                    <button class="btn-action" style="flex:1; font-size:0.8rem; padding:8px;">NEXT</button>
                </div>
            </div>
        </div>

        <button class="btn-action" style="width: min(80vw, 300px); margin-bottom: 5vh;" id="start-btn">START GAME</button>
    </div>

    <div id="game-hud">
        <div class="leaderboard glass-panel">
            <h4 style="color:#00ffc8; margin-bottom:5px;">TOP 5 RANGERS</h4>
            <div id="leaderboard-list"></div>
        </div>

        <div class="action-panel">
            <div id="btn-dash" class="hud-btn glass-panel interactive" style="border-color:#fff; cursor:pointer;">DASH</div>
            <div id="btn-weapon" class="hud-btn glass-panel interactive locked" style="border-color:#00ffc8; cursor:pointer;">SKILL</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 在所有 JS 加载前，强行在最高窗口注入全局状态变量，防止物理引擎和UI打架
        window.isGameRunning = false;
        window.playerWallet = window.playerWallet || { coins: 5, lightning: 0, vacuum: 0, hasShield: false, hasLightning: false, hasVacuum: false };
    </script>

    <script src="MainScene.js"></script>
    <script src="PhysicsEngine.js"></script>
    <script src="WeaponSystem.js"></script>
    <script src="GameUI.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            console.log("BallRanger.io: 全盘合体初始化就绪。正在架设破门通路...");

            const startButton = document.getElementById('start-btn');
            const mainMenu = document.getElementById('main-menu');
            const gameHud = document.getElementById('game-hud');

            // 核心破门点火函数
            function executeGameLaunch() {
                // 如果主界面已经关了，说明运行中，直接跳过防止二次初始化
                if (mainMenu && mainMenu.style.display === 'none') return;

                console.log("🔥 收到起跑信号！强行切断封面，释放 3D 战场！");
                
                // 1. UI 瞬间切换
                if (mainMenu) mainMenu.style.display = 'none';
                if (gameHud) gameHud.style.display = 'block';

                // 2. 强行激活所有子文件里的核心状态机
                window.isGameRunning = true;
                if (typeof isGameRunning !== 'undefined') isGameRunning = true;

                // 3. 强行激活 File 3 物理引擎的局内对局初始化
                if (typeof initPhysicsMatch === 'function') {
                    initPhysicsMatch();
                } else if (window.initPhysicsMatch === 'function') {
                    window.initPhysicsMatch();
                }

                // 4. 强行拉起 File 2 3D 渲染主循环（防止静止一片黑）
                if (typeof animate === 'function') {
                    requestAnimationFrame(animate);
                }
            }

            // 监听一：强行绑定鼠标点击、电话和 iPad 的手指触摸
            if (startButton) {
                startButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    executeGameLaunch();
                });
                startButton.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    executeGameLaunch();
                });
            }

            // 监听二：强行破门！键盘 Enter 键死死绑架
            window.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.keyCode === 13) {
                    executeGameLaunch();
                }
            });
        });
    </script>
</body>
</html>
